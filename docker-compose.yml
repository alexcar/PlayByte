services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: playbyte-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Playbyte_dev_pwd1"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - playbyte_mssqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  playbyte_mssqldata:
